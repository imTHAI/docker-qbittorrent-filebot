name: Check and Build

on:
  schedule:
    - cron: '0 4 * * *'  # tous les jours à 4h UTC (heure creuse)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest qBittorrent static binary release
        id: upstream
        run: |
          # Track userdocs/qbittorrent-nox-static (actual binary source) rather than
          # qbittorrent/qBittorrent — avoids builds where qbt releases but the static
          # binary isn't yet available, producing an image with the previous version.
          # Tag format: "release-5.2.2_v2.0.13" -> "v5.2.2"
          RAW_TAG=$(gh release view --repo userdocs/qbittorrent-nox-static --json tagName -q .tagName)
          if [ -z "$RAW_TAG" ] || [ "$RAW_TAG" = "null" ]; then
            echo "Failed to resolve upstream tag"
            exit 1
          fi
          TAG=$(echo "$RAW_TAG" | sed 's/release-\([0-9.]*\)_.*/v\1/')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get last built version
        id: cache
        run: |
          if [ -f .last-version ]; then
            echo "tag=$(cat .last-version)" >> $GITHUB_OUTPUT
          else
            echo "tag=none" >> $GITHUB_OUTPUT
          fi

      # MODIFICATION 1 : Installer QEMU pour émuler l'ARM64 pendant le build
      - name: Set up QEMU
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # QBT_VERSION busts the builder layer cache when the version changes,
          # ensuring the binary is re-downloaded rather than served from GHA cache.
          build-args: |
            QBT_VERSION=${{ steps.upstream.outputs.tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/qbittorrent-filebot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/qbittorrent-filebot:${{ steps.upstream.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update cached version
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > .last-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-version
          git commit -m "chore: bump last built version to ${{ steps.upstream.outputs.tag }}"
          git push
