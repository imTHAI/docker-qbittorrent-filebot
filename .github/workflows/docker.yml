name: Check qBittorrent new release

on:
  schedule:
    - cron: '0 9 * * *'   # tous les jours à 9h UTC
  workflow_dispatch:       # possibilité de lancer manuellement

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest qBittorrent release
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/qbittorrent/qBittorrent/releases/latest \
            | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get last built version
        id: cache
        run: |
          if [ -f .last-version ]; then
            echo "tag=$(cat .last-version)" >> $GITHUB_OUTPUT
          else
            echo "tag=none" >> $GITHUB_OUTPUT
          fi

      - name: Trigger build if new version
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag
        run: |
          echo "Nouvelle version détectée : ${{ steps.upstream.outputs.tag }}"
          gh workflow run build-and-push.yml \
            --field tag=${{ steps.upstream.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cached version
        if: steps.upstream.outputs.tag != steps.cache.outputs.tag
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > .last-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-version
          git commit -m "chore: bump last built version to ${{ steps.upstream.outputs.tag }}"
          git push
