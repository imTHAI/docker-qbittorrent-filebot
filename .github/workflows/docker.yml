name: Build and Push Docker Image (qbittorrent)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g., v5.1.3)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (AMD64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          # build-args: |
          #   ARG_NAME=${{ github.event.inputs.tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/qbittorrent-filebot:${{ github.event.inputs.tag }}
            ghcr.io/imthai/qbittorrent-filebot:${{ github.event.inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/qbittorrent-filebot:latest
            ghcr.io/imthai/qbittorrent-filebot:latest
